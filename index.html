<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiểm tra Mật khẩu</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; padding: 20px; }
        .container { max-width: 600px; margin: auto; border: 1px solid #ccc; padding: 20px; border-radius: 8px; }
        h2 { color: #333; }
    </style>
</head>
<body>

<div class="container">
    <h2>Kết quả Kiểm tra Mật khẩu</h2>
    <div id="result"></div>
</div>

<script>
    function validatePassword() {
        let password = "";
        let isValid = false;

        while (!isValid) {
            password = prompt("Vui lòng nhập mật khẩu của bạn:");

            // Nếu người dùng nhấn Cancel
            if (password === null) {
                alert("Bạn đã hủy thao tác.");
                return;
            }

            let errors = [];

            // 1. Kiểm tra độ dài ít nhất 8 ký tự
            if (password.length < 8) {
                errors.push("Mật khẩu phải có ít nhất 8 ký tự.");
            }

            // 2. Kiểm tra chữ cái viết hoa
            if (!/[A-Z]/.test(password)) {
                errors.push("Mật khẩu phải chứa ít nhất một chữ cái viết hoa (A-Z).");
            }

            // 3. Kiểm tra chữ cái viết thường
            if (!/[a-z]/.test(password)) {
                errors.push("Mật khẩu phải chứa ít nhất một chữ cái viết thường (a-z).");
            }

            // 4. Kiểm tra chữ số
            if (!/[0-9]/.test(password)) {
                errors.push("Mật khẩu phải chứa ít nhất một chữ số (0-9).");
            }

            // 5. Kiểm tra ký tự đặc biệt
            if (!/[!@#$%^&*(),.?":{}|<>]/.test(password)) {
                errors.push("Mật khẩu phải chứa ít nhất một ký tự đặc biệt (@, #, $, %...).");
            }

            if (errors.length > 0) {
                alert("Mật khẩu không hợp lệ:\n- " + errors.join("\n- "));
            } else {
                isValid = true;
                displayStrength(password);
            }
        }
    }

    function displayStrength(pw) {
        let strength = "";
        let color = "";

        if (pw.length === 8) {
            strength = "Yếu (Chỉ vừa đủ 8 ký tự)";
            color = "orange";
        } else if (pw.length < 12) {
            strength = "Trung bình (Đủ điều kiện & dưới 12 ký tự)";
            color = "blue";
        } else {
            strength = "Mạnh (Đủ điều kiện & từ 12 ký tự trở lên)";
            color = "green";
        }

        const resultDiv = document.getElementById("result");
        resultDiv.innerHTML = `
            <p style="font-weight: bold; color: green;">Mật khẩu hợp lệ!</p>
            <p>Độ mạnh: <span style="font-weight: bold; color: ${color};">${strength}</span></p>
        `;
        alert("Mật khẩu hợp lệ!\nĐộ mạnh: " + strength);
    }

    // Thực thi hàm khi trang web tải xong
    window.onload = validatePassword;
</script>

</body>
</html>
