<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<title>Danh sách sinh viên</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
font-family: Arial;
margin:40px;
}

table{
border-collapse: collapse;
width:100%;
margin-top:20px;
}

th,td{
border:1px solid #ccc;
padding:8px;
}

th{
background:#f2f2f2;
}

</style>

</head>

<body>

<h2>Danh sách sinh viên</h2>

<input type="file" id="fileInput">

<table id="studentTable">

<thead>

<tr>
<th>STT</th>
<th>Mã SV</th>
<th>Họ tên</th>
<th>Khóa</th>
<th>Khoa</th>
<th>Email</th>
</tr>

</thead>

<tbody></tbody>

</table>

<script>

// ===== Hàm bỏ dấu tiếng Việt =====

function removeVietnameseTones(str){

return str
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"")
.replace(/đ/g,"d")
.replace(/Đ/g,"D")

}

// ===== Class Student =====

class Student{

constructor(stt, studentId, fullName){

this.stt = stt
this.studentId = studentId
this.fullName = fullName

}

getCourse(){

return this.studentId.substring(0,2)

}

getFaculty(){

let facultyCode = this.studentId.substring(2,6)

let faculty=""

if (facultyCode === "A401") faculty = "Ngân hàng, Tài chính"
else if (facultyCode === "A404") faculty = "Công nghệ thông tin & Kinh tế số"
else if (facultyCode === "A402") faculty = "Kế toán - Kiểm toán"
else if (facultyCode === "A407") faculty = "Kinh tế đầu tư"
else if (facultyCode === "A405") faculty = "Quản trị kinh doanh; Kinh doanh quốc tế"
else if (facultyCode === "A406") faculty = "Luật kinh tế"
else if (facultyCode === "A403") faculty = "QTDL"
else if (facultyCode === "A751") faculty = "Ngôn ngữ"

return faculty

}

createEmail(){

let name = removeVietnameseTones(this.fullName)
.toLowerCase()
.trim()

let nameParts = name.split(/\s+/)

let lastName = nameParts[nameParts.length-1]

let firstLetters=""

for(let i=0;i<nameParts.length-1;i++){
firstLetters += nameParts[i][0]
}

let msvLower = this.studentId.toLowerCase()

return lastName + firstLetters + "." + msvLower + "@hvnh.edu.vn"

}

}

// ===== Đọc file Excel =====

document.getElementById("fileInput").addEventListener("change",function(e){

let file = e.target.files[0]

let reader = new FileReader()

reader.onload = function(event){

let data = new Uint8Array(event.target.result)

let workbook = XLSX.read(data,{type:"array"})

let sheet = workbook.Sheets[workbook.SheetNames[0]]

let json = XLSX.utils.sheet_to_json(sheet)

displayStudents(json)

}

reader.readAsArrayBuffer(file)

})

// ===== Hiển thị bảng =====

function displayStudents(data){

let tbody = document.querySelector("#studentTable tbody")

tbody.innerHTML=""

data.forEach(row=>{

let student = new Student(
row["STT"],
row["Mã SV"],
row["Họ tên"]
)

let tr = document.createElement("tr")

tr.innerHTML = `
<td>${student.stt}</td>
<td>${student.studentId}</td>
<td>${student.fullName}</td>
<td>${student.getCourse()}</td>
<td>${student.getFaculty()}</td>
<td>${student.createEmail()}</td>
`

tbody.appendChild(tr)

})

}

</script>

</body>
</html>
